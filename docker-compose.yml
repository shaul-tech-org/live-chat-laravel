version: "3.8"

services:
  # ===========================
  # Nginx — Reverse Proxy (HTTP + WSS)
  # ===========================
  nginx:
    build: ./docker/nginx
    container_name: lchat-nginx
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./storage/app/public:/var/www/html/storage/app/public:ro
    depends_on:
      - app
      - reverb
    restart: unless-stopped
    networks:
      - lchat

  # ===========================
  # PHP-FPM — Laravel Application
  # ===========================
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: lchat-app
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lchat

  # ===========================
  # Reverb — WebSocket Server
  # ===========================
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: lchat-reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - .:/var/www/html
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - lchat

  # ===========================
  # Queue Worker — Event Processing
  # ===========================
  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: lchat-worker
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - lchat

  # ===========================
  # Scheduler — Cron Tasks
  # ===========================
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: lchat-scheduler
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
    env_file: .env
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - lchat

  # ===========================
  # PostgreSQL 18
  # ===========================
  postgres:
    image: postgres:18-alpine
    container_name: lchat-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-chatuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_DATABASE:-live_chat}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-chatuser} -d ${DB_DATABASE:-live_chat}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - lchat

  # ===========================
  # MongoDB 8
  # ===========================
  mongodb:
    image: mongo:8
    container_name: lchat-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-chatuser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
    volumes:
      - mongodb-data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "${MONGO_USERNAME:-chatuser}", "-p", "${MONGO_PASSWORD:-changeme}", "--authenticationDatabase", "admin"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - lchat

  # ===========================
  # Redis 8
  # ===========================
  redis:
    image: redis:8-alpine
    container_name: lchat-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - lchat

volumes:
  postgres-data:
  mongodb-data:
  redis-data:

networks:
  lchat:
    driver: bridge
